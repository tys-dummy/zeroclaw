default_provider = "custom:https://your-llm-gateway/v1"
default_temperature = 0.7
default_model = "gpt-5-mini"
api_key = "<your-api-key>"

model_routes = [
    { hint = "gemini-lite", provider = "custom:https://your-llm-gateway/v1", model = "gemini-3.1-flash-lite-preview" },
    { hint = "gpt-5-code", provider = "custom:https://your-llm-gateway/v1", model = "gpt-5.3-codex" },
    { hint = "reasoning", provider = "custom:https://your-llm-gateway/v1", model = "gpt-5-mini" }
]

[observability]
backend = "none"
runtime_trace_mode = "none"
runtime_trace_path = "state/runtime-trace.jsonl"
runtime_trace_max_entries = 200

[autonomy]
level = "full"
workspace_only = false
allowed_commands = ["*"]
forbidden_paths = [
    "/etc", "/root", "/home", "/usr", "/bin", "/sbin", "/lib", "/opt", "/boot", "/dev", "/proc", "/sys", "/var", "/tmp", "~/.ssh", "~/.gnupg", "~/.aws", "~/.config"
]
max_actions_per_hour = 20
max_cost_per_day_cents = 500
require_approval_for_medium_risk = false
block_high_risk_commands = false
shell_env_passthrough = []
auto_approve = ["file_read", "memory_recall"]
always_ask = []
allowed_roots = []
non_cli_excluded_tools = []

[security.sandbox]
backend = "auto"
firejail_args = []

[security.resources]
max_memory_mb = 192
max_cpu_time_seconds = 60
max_subprocesses = 10
memory_monitoring = true

[security.audit]
enabled = true
log_path = "audit.log"
max_size_mb = 100
sign_events = false

[security.otp]
enabled = false
method = "totp"
token_ttl_secs = 30
cache_valid_secs = 300
gated_actions = ["shell", "file_write", "browser_open", "browser", "memory_forget"]
gated_domains = []
gated_domain_categories = []

[security.estop]
enabled = false
state_file = "~/.zeroclaw/estop-state.json"
require_otp_to_resume = true

[runtime]
kind = "native"

[runtime.docker]
image = "alpine:3.22.0"
network = "none"
memory_limit_mb = 512
cpu_limit = 1.0
read_only_rootfs = true
mount_workspace = true
allowed_workspace_roots = []

[reliability]
provider_retries = 2
provider_backoff_ms = 500
fallback_providers = []
api_keys = []
channel_initial_backoff_secs = 2
channel_max_backoff_secs = 60
scheduler_poll_secs = 15
scheduler_retries = 2

[reliability.model_fallbacks]

[scheduler]
enabled = true
max_tasks = 64
max_concurrent = 4

[agent]
compact_context = true
max_tool_iterations = 100
max_history_messages = 100
parallel_tools = true
tool_dispatcher = "auto"

[skills]
open_skills_enabled = false
prompt_injection_mode = "compact"
allow_scripts = true

[query_classification]
enabled = false
rules = []

[heartbeat]
enabled = true
interval_minutes = 60
target = "telegram"
to = "<your-telegram-user-id>"

[cron]
enabled = true
max_run_history = 50

[cron.jobs.delivery]
mode = "announce"
channel = "telegram"
to = "1004394120"
best_effort = true

[channels_config]
cli = true
message_timeout_secs = 300

[channels_config.telegram]
bot_token = "<your-telegram-bot-token>"
allowed_users = ["<your-telegram-user-id>"]
stream_mode = "partial"
draft_update_interval_ms = 1000
interrupt_on_new_message = true
mention_only = false

[channels_config.email]
imap_host = "imap.gmail.com"
imap_port = 993
imap_folder = "INBOX"
smtp_host = "smtp.gmail.com"
smtp_port = 465
smtp_tls = true
username = "<your-gmail-address>"
password = "<your-gmail-app-password>"
from_address = "<your-gmail-address>"
idle_timeout_secs = 1740
allowed_senders = ["*"]

[memory]
backend = "sqlite"
auto_save = true
hygiene_enabled = true
archive_after_days = 7
purge_after_days = 30
conversation_retention_days = 30
embedding_provider = "none"
embedding_model = "text-embedding-3-small"
embedding_dimensions = 1536
vector_weight = 0.7
keyword_weight = 0.3
min_relevance_score = 0.4
embedding_cache_size = 10000
chunk_max_tokens = 512
response_cache_enabled = false
response_cache_ttl_minutes = 60
response_cache_max_entries = 5000
snapshot_enabled = false
snapshot_on_hygiene = false
auto_hydrate = true

[storage.provider.config]
provider = ""
schema = "public"
table = "memories"

[tunnel]
provider = "none"

[gateway]
port = 42617
host = "[::]"
require_pairing = true
allow_public_bind = true
pair_rate_limit_per_minute = 10
webhook_rate_limit_per_minute = 60
trust_forwarded_headers = false
rate_limit_max_keys = 10000
idempotency_ttl_secs = 300
idempotency_max_keys = 10000

[composio]
enabled = false
entity_id = "default"

[secrets]
encrypt = false

[browser]
enabled = false
allowed_domains = []
backend = "agent_browser"
native_headless = true
native_webdriver_url = "http://127.0.0.1:9515"

[browser.computer_use]
endpoint = "http://127.0.0.1:8787/v1/actions"
timeout_ms = 15000
allow_remote_endpoint = false
window_allowlist = []

[http_request]
enabled = true
allowed_domains = ["*"]
max_response_size = 1000000
timeout_secs = 30

[multimodal]
max_images = 4
max_image_size_mb = 5
allow_remote_fetch = false

[web_search]
enabled = true
provider = "duckduckgo"
max_results = 15
timeout_secs = 15

[proxy]
enabled = false
no_proxy = []
scope = "zeroclaw"
services = []

[identity]
format = "openclaw"

[cost]
enabled = false
daily_limit_usd = 10.0
monthly_limit_usd = 100.0
warn_at_percent = 80
allow_override = false

[cost.prices."openai/o1-preview"]
input = 15.0
output = 60.0

[cost.prices."anthropic/claude-3-haiku"]
input = 0.25
output = 1.25

[cost.prices."openai/gpt-4o-mini"]
input = 0.15
output = 0.6

[cost.prices."anthropic/claude-opus-4-20250514"]
input = 15.0
output = 75.0

[cost.prices."openai/gpt-4o"]
input = 5.0
output = 15.0

[cost.prices."google/gemini-2.0-flash"]
input = 0.1
output = 0.4

[cost.prices."anthropic/claude-3.5-sonnet"]
input = 3.0
output = 15.0

[cost.prices."google/gemini-1.5-pro"]
input = 1.25
output = 5.0

[cost.prices."anthropic/claude-sonnet-4-20250514"]
input = 3.0
output = 15.0

[peripherals]
enabled = false
boards = []

[agents]

[hooks]
enabled = true

[hooks.builtin]
command_logger = false

[hardware]
enabled = false
transport = "None"
baud_rate = 115200
workspace_datasheets = false

[transcription]
enabled = false
api_url = "https://api.groq.com/audio/transcriptions"
model = "whisper-large-v3-turbo"
max_duration_secs = 120
